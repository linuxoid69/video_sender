name: Docker Build and Push
run-name: ${{ github.actor }} triggered build or push
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Build image locally
        run: |
          make build-save

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: video_sender_docker_image
          path: video_sender.tar
          retention-days: 1

  push:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: video_sender_docker_image

      - name: Load image
        run: docker load -i video_sender.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_PASS }}
          password: ${{ secrets.DOCKER_USER }}
          
      - name: Push image if requested
        run: |
          make push
